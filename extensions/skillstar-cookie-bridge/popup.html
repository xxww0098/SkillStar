<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SkillStar Cookie Bridge</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <p class="eyebrow">SkillStar Bridge</p>
          <h1>OpenCode Cookie</h1>
        </div>
        <span id="state-pill" class="pill">检查中</span>
      </header>

      <section id="setup-panel" class="panel">
        <p class="lead">在 SkillStar 设置页生成绑定码，粘贴到这里完成一次绑定。</p>
        <label>
          SkillStar 绑定码
          <input id="token" type="text" autocomplete="off" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
        </label>
        <button id="bind" type="button">绑定并推送</button>
      </section>

      <section id="ready-panel" class="panel">
        <p class="lead">已绑定本机 SkillStar。保持 SkillStar 运行，点击即可推送最新 Cookie。</p>
        <button id="push" type="button">推送 OpenCode Cookie</button>
        <button id="reset" class="secondary" type="button">解除本机绑定</button>
      </section>

      <p id="status" class="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
