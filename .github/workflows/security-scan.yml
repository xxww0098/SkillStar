name: Security Scan

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          # Rust is audited by cargo-deny in CI; CodeQL Autobuild cannot
          # compile Tauri without system libs so we scope to JS/TS only.
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  skill-scan-gate:
    name: Skill scan gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf pkg-config

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Security scan tests
        run: cargo test --manifest-path src-tauri/Cargo.toml security_scan::tests:: -- --nocapture

      - name: Skill scan gate (repo skills)
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t skill_files < <(find . -type f -name "SKILL.md" \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -not -path "./dist/*")

          if [ "${#skill_files[@]}" -eq 0 ]; then
            echo "No SKILL.md files found, skipping repository skill scan."
            exit 0
          fi

          blocked=0
          for skill_file in "${skill_files[@]}"; do
            skill_dir="$(dirname "$skill_file")"
            echo "Scanning ${skill_dir}..."
            out_json="$(mktemp)"

            if ! cargo run --quiet --manifest-path src-tauri/Cargo.toml -- scan "${skill_dir}" --static-only >"${out_json}"; then
              echo "Static scan command failed for ${skill_dir}" >&2
              blocked=1
              rm -f "${out_json}"
              continue
            fi

            if ! python3 - "${out_json}" "${skill_dir}" <<'PY'
import json
import sys

report_path = sys.argv[1]
skill_dir = sys.argv[2]
with open(report_path, "r", encoding="utf-8") as f:
    data = json.load(f)

risk = str(data.get("risk_level", "Safe")).strip().lower()
findings = data.get("static_findings") or []
print(f"Result: {skill_dir} risk={risk} findings={len(findings)}")

if risk in {"high", "critical"}:
    print(
        f"Blocked by security gate: {skill_dir} risk={risk} findings={len(findings)}",
        file=sys.stderr,
    )
    raise SystemExit(2)
PY
            then
              blocked=1
            fi

            rm -f "${out_json}"
          done

          if [ "${blocked}" -ne 0 ]; then
            echo "Repository skill scan gate failed." >&2
            exit 1
          fi
