<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" fill="none">
  <defs>
    <style>
      .bg { fill: transparent; }
      .text-primary { fill: #f4f4f5; font-family: 'DM Sans', Inter, system-ui, sans-serif; }
      .text-muted { fill: #a1a1aa; font-family: 'DM Sans', Inter, system-ui, sans-serif; }
      .text-blue { fill: #3b82f6; font-family: 'DM Sans', Inter, system-ui, sans-serif; }
      .text-green { fill: #22c55e; font-family: 'DM Sans', Inter, system-ui, sans-serif; }
      .card { fill: rgba(255,255,255,0.02); stroke: rgba(255,255,255,0.08); stroke-width: 1; }
      .card-header { fill: rgba(255,255,255,0.04); }
      .card-highlight { fill: rgba(59,130,246,0.03); stroke: rgba(59,130,246,0.3); stroke-width: 1.5; }
      .badge-green { fill: rgba(34,197,94,0.1); stroke: rgba(34,197,94,0.3); stroke-width: 1; }
      .badge-blue { fill: rgba(59,130,246,0.1); stroke: rgba(59,130,246,0.3); stroke-width: 1; }
      .path-line { stroke: rgba(255,255,255,0.1); stroke-width: 1.5; fill: none; }
      .path-blue { stroke: rgba(59,130,246,0.6); stroke-width: 1.5; fill: none; stroke-dasharray: 4 4; }
    </style>
  </defs>

  <rect width="960" height="520" rx="16" class="bg" />
  
  <text x="480" y="60" text-anchor="middle" style="font-size: 20px; font-weight: 600; fill: #f4f4f5; font-family: 'DM Sans', Inter, system-ui, sans-serif;">SkillStar 工作流：统一编排，精准分发</text>

  <g transform="translate(100, 190)">
    <rect width="180" height="150" rx="12" class="card"/>
    <rect width="180" height="46" rx="12" class="card-header"/>
    <rect width="180" height="10" y="36" class="card-header"/>
    <text x="90" y="30" text-anchor="middle" font-size="16" font-weight="600" class="text-primary">Skills Center</text>
    
    <text x="90" y="80" text-anchor="middle" font-size="14" class="text-muted">Marketplace</text>
    <text x="90" y="110" text-anchor="middle" font-size="14" class="text-muted">Local Skills</text>
    <text x="90" y="140" text-anchor="middle" font-size="14" class="text-muted">GitHub Repos</text>
  </g>

  <g transform="translate(360, 185)">
    <rect width="140" height="160" rx="12" class="card"/>
    <rect width="140" height="46" rx="12" class="card-header"/>
    <rect width="140" height="10" y="36" class="card-header"/>
    <text x="70" y="30" text-anchor="middle" font-size="16" font-weight="600" class="text-primary">Decks</text>
    
    <text x="70" y="80" text-anchor="middle" font-size="14" class="text-muted">技能套牌</text>
    <text x="70" y="110" text-anchor="middle" font-size="14" class="text-muted">一键组合</text>
    <text x="70" y="140" text-anchor="middle" font-size="14" class="text-muted">支持打包分享</text>
  </g>

  <g transform="translate(580, 165)">
    <rect width="180" height="200" rx="12" class="card-highlight"/>
    <text x="90" y="45" text-anchor="middle" font-size="18" font-weight="600" class="text-blue">Projects</text>
    <text x="90" y="80" text-anchor="middle" font-size="14" class="text-muted">按需订阅技能</text>
    <rect x="35" y="110" width="110" height="26" rx="13" class="badge-blue"/>
    <text x="90" y="128" text-anchor="middle" font-size="12" font-weight="600" class="text-blue">统一分发</text>
    <rect x="25" y="150" width="130" height="26" rx="13" class="badge-green"/>
    <text x="90" y="168" text-anchor="middle" font-size="12" font-weight="600" class="text-green">0占用 Symlink挂载</text>
  </g>

  <g transform="translate(820, 110)">
    <rect width="100" height="42" rx="8" class="card"/>
    <text x="50" y="26" text-anchor="middle" font-size="13" font-weight="500" class="text-primary">Gemini</text>
  </g>
  <g transform="translate(820, 162)">
    <rect width="100" height="42" rx="8" class="card"/>
    <text x="50" y="26" text-anchor="middle" font-size="13" font-weight="500" class="text-primary">Claude</text>
  </g>
  <g transform="translate(820, 214)">
    <rect width="100" height="42" rx="8" class="card"/>
    <text x="50" y="26" text-anchor="middle" font-size="13" font-weight="500" class="text-primary">Antigravity</text>
  </g>
  <g transform="translate(820, 266)">
    <rect width="100" height="42" rx="8" class="card"/>
    <text x="50" y="26" text-anchor="middle" font-size="13" font-weight="500" class="text-primary">Codex</text>
  </g>
  <g transform="translate(820, 318)">
    <rect width="100" height="42" rx="8" class="card"/>
    <text x="50" y="26" text-anchor="middle" font-size="13" font-weight="500" class="text-primary">OpenClaw</text>
  </g>
  <g transform="translate(820, 370)">
    <rect width="100" height="42" rx="8" class="card"/>
    <text x="50" y="26" text-anchor="middle" font-size="13" font-weight="500" class="text-primary">OpenCode</text>
  </g>

  <line x1="280" y1="265" x2="360" y2="265" class="path-blue"/>
  <circle cx="320" cy="265" r="4" fill="#3b82f6" opacity="0.6"/>
  
  <line x1="500" y1="265" x2="580" y2="265" class="path-blue"/>
  <circle cx="540" cy="265" r="4" fill="#3b82f6" opacity="0.6"/>

  <path d="M 760 180 C 790 180, 790 131, 820 131" class="path-line"/>
  <path d="M 760 210 C 790 210, 790 183, 820 183" class="path-line"/>
  <path d="M 760 240 C 790 240, 790 235, 820 235" class="path-line"/>
  <path d="M 760 270 C 790 270, 790 287, 820 287" class="path-line"/>
  <path d="M 760 300 C 790 300, 790 339, 820 339" class="path-line"/>
  <path d="M 760 330 C 790 330, 790 391, 820 391" class="path-line"/>

</svg>
