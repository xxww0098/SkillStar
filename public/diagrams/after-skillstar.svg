    <text x="90" y="72" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="12" fill="#5a8a6a">✦ 专长：六边形战士</text>
    <rect x="16" y="90" width="148" height="52" rx="8" fill="#10b9810a" stroke="#10b98125" stroke-width="1"/>
