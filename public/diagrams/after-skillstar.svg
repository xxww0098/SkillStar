    <rect x="0" y="30" width="180" height="12" fill="#0e2a30"/>
    <text x="90" y="30" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#06b6d4">Gemini CLI</text>
    <line x1="14" y1="48" x2="166" y2="48" stroke="#06b6d420" stroke-width="1"/>
    <!-- Specialty -->
