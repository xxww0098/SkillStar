    <!-- Assigned Deck -->
    <rect x="16" y="90" width="148" height="52" rx="8" fill="#06b6d40a" stroke="#06b6d425" stroke-width="1"/>
    <text x="90" y="111" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#06b6d4">🃏 Frontend Expert</text>
    <text x="90" y="130" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="10" fill="#4a6a7a">UI审美 · 动效 · 配色</text>
    <!-- Skills -->
    <text x="90" y="160" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#4a5a6a">frontend-design</text>
    <text x="90" y="176" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#4a5a6a">animate · colorize</text>
    <text x="90" y="192" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#3a4a5a">···</text>
  </g>

