  <!-- Agent 1: Gemini CLI — 前端审美 -->
  <g transform="translate(30, 244)">
    <rect width="180" height="200" rx="12" fill="url(#agentFill)" stroke="#06b6d450" stroke-width="1.5"/>
    <!-- Header -->
