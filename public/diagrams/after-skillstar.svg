    <text x="90" y="160" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#4a5a6a">audit · polish</text>
    <text x="90" y="176" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#4a5a6a">harden · clarify</text>
    <text x="90" y="192" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#3a4a5a">···</text>
  </g>

  <!-- Agent 4: OpenCode — 六边形战士 -->
  <g transform="translate(750, 244)">
    <rect width="180" height="200" rx="12" fill="url(#agentFill)" stroke="#10b98150" stroke-width="1.5"/>
    <rect width="180" height="42" rx="12" fill="#0e2a1e"/>
