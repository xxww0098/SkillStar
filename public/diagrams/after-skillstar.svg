    <text x="90" y="130" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="10" fill="#4a7a5a">全栈 · 架构 · DevOps</text>
    <text x="90" y="160" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#4a5a6a">frontend-design</text>
    <text x="90" y="176" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#4a5a6a">rust-skills · adapt</text>
    <text x="90" y="192" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#3a4a5a">···</text>
  </g>


  <!-- ══════════ Bottom: Benefits ══════════ -->

  <!-- Divider -->
  <line x1="80" y1="475" x2="880" y2="475" stroke="#ffffff08" stroke-width="1"/>

  <text x="175" y="508" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#10b981">✓ 各尽其才</text>
  <text x="175" y="528" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="10" fill="#4a5a6a">按专长分配技能</text>

  <text x="390" y="508" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#10b981">✓ 零文件污染</text>
  <text x="390" y="528" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="10" fill="#4a5a6a">纯 Symlink 挂载</text>

  <text x="590" y="508" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#10b981">✓ Token 节省</text>
  <text x="590" y="528" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="10" fill="#4a5a6a">只加载所需技能</text>

  <text x="790" y="508" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#10b981">✓ 巅峰智力</text>
  <text x="790" y="528" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="10" fill="#4a5a6a">精准聚焦不稀释</text>

  <!-- Subtle bottom accent -->
  <line x1="300" y1="555" x2="660" y2="555" stroke="#8b5cf615" stroke-width="1"/>
</svg>
