    <text x="90" y="72" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="12" fill="#7a6a8a">✦ 专长：严密推理大师</text>
    <rect x="16" y="90" width="148" height="52" rx="8" fill="#8b5cf60a" stroke="#8b5cf625" stroke-width="1"/>
    <text x="90" y="111" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b5cf6">🃏 Rust Builder</text>
    <text x="90" y="130" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="10" fill="#5a4a7a">架构 · 错误处理 · 性能</text>
    <text x="90" y="160" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#4a5a6a">rust-skills</text>
    <text x="90" y="176" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#4a5a6a">harden · optimize</text>
    <text x="90" y="192" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#3a4a5a">···</text>
