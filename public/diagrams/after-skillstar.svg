<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="960" y2="580" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="heroBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="heroFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a3a"/>
      <stop offset="100%" stop-color="#12122a"/>
    </linearGradient>
    <linearGradient id="agentBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a4c"/>
      <stop offset="100%" stop-color="#1e1e38"/>
    </linearGradient>
    <linearGradient id="agentFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a30"/>
      <stop offset="100%" stop-color="#141428"/>
    </linearGradient>
    <linearGradient id="linkCyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#06b6d480"/>
    </linearGradient>
    <linearGradient id="linkPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#8b5cf680"/>
    </linearGradient>
    <linearGradient id="linkAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f59e0b80"/>
    </linearGradient>
    <linearGradient id="linkEmerald" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#10b98180"/>
    </linearGradient>
    <filter id="heroGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff06" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="heroAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf618"/>
      <stop offset="100%" stop-color="#8b5cf600"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="580" rx="16" fill="url(#bg2)"/>
  <rect width="960" height="580" rx="16" fill="url(#grid2)"/>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="20" font-weight="600" fill="#e0e0e8">SkillStar：各尽其才，精准编排</text>

  <!-- Hero Aura -->
  <ellipse cx="480" cy="120" rx="160" ry="70" fill="url(#heroAura)"/>

  <!-- Hero Box: SkillStar -->
  <g transform="translate(368, 72)">
    <rect width="224" height="96" rx="14" fill="url(#heroFill)" stroke="url(#heroBorder)" stroke-width="2" filter="url(#heroGlow)"/>
    <text x="112" y="36" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="20" font-weight="800" fill="#e0e0f0">⭐ SkillStar</text>
    <line x1="24" y1="50" x2="200" y2="50" stroke="#ffffff12" stroke-width="1"/>
    <text x="112" y="72" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" fill="#8b8baf">按专长分配不同技能套牌</text>
  </g>


  <!-- ══════════ Connection Lines ══════════ -->
  <!-- To Gemini (cyan) -->
  <path d="M 420 168 L 420 200 L 120 200 L 120 236" stroke="url(#linkCyan)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <polygon points="115,232 120,244 125,232" fill="#06b6d4" opacity="0.7"/>

  <!-- To Claude (purple) -->
  <path d="M 460 168 L 460 210 L 350 210 L 350 236" stroke="url(#linkPurple)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <polygon points="345,232 350,244 355,232" fill="#8b5cf6" opacity="0.7"/>

  <!-- To Codex (amber) -->
  <path d="M 500 168 L 500 210 L 610 210 L 610 236" stroke="url(#linkAmber)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <polygon points="605,232 610,244 615,232" fill="#f59e0b" opacity="0.7"/>

  <!-- To OpenCode (emerald) -->
  <path d="M 540 168 L 540 200 L 840 200 L 840 236" stroke="url(#linkEmerald)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <polygon points="835,232 840,244 845,232" fill="#10b981" opacity="0.7"/>


