<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" fill="none">
  <defs>
    <style>
      .bg { fill: transparent; }
      .text-primary { fill: #f4f4f5; font-family: 'DM Sans', Inter, system-ui, sans-serif; }
      .text-muted { fill: #a1a1aa; font-family: 'DM Sans', Inter, system-ui, sans-serif; }
      .card { fill: rgba(255,255,255,0.02); stroke: rgba(255,255,255,0.08); stroke-width: 1; }
      .card-header { fill: rgba(255,255,255,0.04); }
      .border-dashed { stroke: rgba(255,255,255,0.15); stroke-dasharray: 4 4; stroke-width: 1.5; }
      .badge { fill: rgba(239,68,68,0.1); stroke: rgba(239,68,68,0.3); stroke-width: 1; }
    </style>
  </defs>

  <rect width="960" height="420" rx="16" class="bg" />
  
  <text x="480" y="60" text-anchor="middle" class="text-primary" style="font-size: 20px; font-weight: 600;">传统方式：碎片化配置，高维护成本</text>

  <g transform="translate(100, 110)">
    <rect width="200" height="200" rx="12" class="card"/>
    <rect width="200" height="50" rx="12" class="card-header"/>
    <rect width="200" height="10" y="40" class="card-header"/>
    <text x="100" y="32" text-anchor="middle" font-size="16" font-weight="600" class="text-primary">Gemini CLI</text>
    
    <text x="100" y="90" text-anchor="middle" font-size="14" class="text-muted">独立复制技能</text>
    <text x="100" y="120" text-anchor="middle" font-size="14" class="text-muted">环境配置冗余</text>
    <text x="100" y="150" text-anchor="middle" font-size="14" class="text-muted">文件存储庞杂</text>
    
    <rect x="50" y="170" width="100" height="26" rx="13" class="badge"/>
    <text x="100" y="188" text-anchor="middle" style="fill: #ef4444; font-size: 13px; font-weight: 500; font-family: 'DM Sans', Inter, system-ui, sans-serif;">高耦合</text>
  </g>

  <g transform="translate(380, 110)">
    <rect width="200" height="200" rx="12" class="card"/>
    <rect width="200" height="50" rx="12" class="card-header"/>
    <rect width="200" height="10" y="40" class="card-header"/>
    <text x="100" y="32" text-anchor="middle" font-size="16" font-weight="600" class="text-primary">Claude Code</text>
    
    <text x="100" y="90" text-anchor="middle" font-size="14" class="text-muted">独立复制技能</text>
    <text x="100" y="120" text-anchor="middle" font-size="14" class="text-muted">环境配置冗余</text>
    <text x="100" y="150" text-anchor="middle" font-size="14" class="text-muted">文件存储庞杂</text>
    
    <rect x="50" y="170" width="100" height="26" rx="13" class="badge"/>
    <text x="100" y="188" text-anchor="middle" style="fill: #ef4444; font-size: 13px; font-weight: 500; font-family: 'DM Sans', Inter, system-ui, sans-serif;">高耦合</text>
  </g>

  <g transform="translate(660, 110)">
    <rect width="200" height="200" rx="12" class="card"/>
    <rect width="200" height="50" rx="12" class="card-header"/>
    <rect width="200" height="10" y="40" class="card-header"/>
    <text x="100" y="32" text-anchor="middle" font-size="16" font-weight="600" class="text-primary">Antigravity</text>
    
    <text x="100" y="90" text-anchor="middle" font-size="14" class="text-muted">独立复制技能</text>
    <text x="100" y="120" text-anchor="middle" font-size="14" class="text-muted">环境配置冗余</text>
    <text x="100" y="150" text-anchor="middle" font-size="14" class="text-muted">文件存储庞杂</text>
    
    <rect x="50" y="170" width="100" height="26" rx="13" class="badge"/>
    <text x="100" y="188" text-anchor="middle" style="fill: #ef4444; font-size: 13px; font-weight: 500; font-family: 'DM Sans', Inter, system-ui, sans-serif;">高耦合</text>
  </g>

  <line x1="312" y1="210" x2="368" y2="210" class="border-dashed"/>
  <line x1="592" y1="210" x2="648" y2="210" class="border-dashed"/>

  <text x="340" y="220" text-anchor="middle" style="fill: #ef4444; font-family: 'DM Sans', sans-serif; font-weight: 300; font-size: 28px;">×</text>
  <text x="620" y="220" text-anchor="middle" style="fill: #ef4444; font-family: 'DM Sans', sans-serif; font-weight: 300; font-size: 28px;">×</text>

  <text x="480" y="360" text-anchor="middle" font-size="15" fill="#ef4444" font-family="'DM Sans', Inter, sans-serif" opacity="0.9">彼此隔离，难以复用</text>
</svg>
